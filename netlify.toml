[build]
  command = ""
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/zip-lookup.json"]

# ─── Domain canonicalization (mandatory) ───
# Every non-canonical variant → https://rebateatlas.org in ONE hop.
# http:// rules listed first so the CDN edge can match them before
# falling through to its automatic HTTP→HTTPS upgrade (which would
# otherwise create a 2-hop chain for http://www variants).

# http → canonical (single hop, avoids http→https then www→non-www chain)
[[redirects]]
  from = "http://www.rebateatlas.org/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://rebateatlas.org/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.rebateatlas.com/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://rebateatlas.com/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

# https non-canonical → canonical
[[redirects]]
  from = "https://rebateatlas.com/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.rebateatlas.com/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.rebateatlas.org/*"
  to = "https://rebateatlas.org/:splat"
  status = 301
  force = true

# ─── Clean URL rewrites (directory index pages) ───
# force = true ensures these serve content directly with status 200
# instead of falling through to Netlify's automatic trailing-slash 301.
[[redirects]]
  from = "/categories"
  to = "/categories/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/states"
  to = "/states/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/guides"
  to = "/guides/index.html"
  status = 200
  force = true

# ─── Keyword shortcuts (rewrites, status 200) ───
# Served as 200 (rewrite) rather than 301 redirect so they no longer
# appear as "Page with redirect" in Google Search Console. The HTML
# carries a canonical pointing to the destination URL, so Google
# consolidates them as alternate pages with proper canonical tags.
[[redirects]]
  from = "/heat-pumps"
  to = "/categories/heat-pumps.html"
  status = 200
  force = true

[[redirects]]
  from = "/solar"
  to = "/categories/solar-panels.html"
  status = 200
  force = true

[[redirects]]
  from = "/solar-panels"
  to = "/categories/solar-panels.html"
  status = 200
  force = true

[[redirects]]
  from = "/ev-chargers"
  to = "/categories/ev-chargers.html"
  status = 200
  force = true

[[redirects]]
